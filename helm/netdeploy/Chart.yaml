apiVersion: v2
name: netdeploy
description: Automated Network Provisioning Platform for BGP/OSPF Deployment
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - networking
  - bgp
  - ospf
  - automation
  - gitops
home: https://github.com/your-org/netdeploy
sources:
  - https://github.com/your-org/netdeploy
maintainers:
  - name: NetDeploy Team
    email: netdeploy@example.com
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
