apiVersion: apps/v1
kind: Deployment
metadata:
  name: netdeploy-api
  namespace: netdeploy
  labels:
    app.kubernetes.io/name: netdeploy
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: netdeploy-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # zero-downtime rolling update
  template:
    metadata:
      labels:
        app: netdeploy-api
        app.kubernetes.io/name: netdeploy
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: netdeploy-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/your-org/netdeploy-api:latest  # REPLACE with your registry
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: netdeploy-config
            - secretRef:
                name: netdeploy-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # allow up to 60s startup
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: git-repo
              mountPath: /data/netdeploy-configs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: git-repo
          persistentVolumeClaim:
            claimName: netdeploy-git-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [netdeploy-api]
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: netdeploy-api
  namespace: netdeploy
  labels:
    app.kubernetes.io/name: netdeploy
    app.kubernetes.io/component: api
spec:
  selector:
    app: netdeploy-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netdeploy-api
  namespace: netdeploy
  labels:
    app.kubernetes.io/name: netdeploy
    app.kubernetes.io/component: api
