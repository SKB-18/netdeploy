# Locust configuration for NetDeploy load tests
# Reference: https://docs.locust.io/en/stable/configuration.html

# Target host (override with --host on CLI)
host = http://localhost:8000

# Default load profile (override per environment)
users = 20
spawn-rate = 2
run-time = 120s

# Headless mode for CI
headless = false

# Output formats
html = tests/load/report.html
csv = tests/load/results

# Stop test if error rate exceeds 5% (CI gate — stricter SLO handled in on_quitting hook)
stop-timeout = 10

# Log level
loglevel = INFO
logfile = tests/load/locust.log
