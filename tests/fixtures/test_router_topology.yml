# Test router topology for integration tests
topology:
  name: test-datacenter
  routers:
    - hostname: test-router-1
      device_type: cisco_xr
      management_ip: 192.168.1.1
      bgp_asn: 65001
      neighbors:
        - ip: 192.168.1.2
          remote_asn: 65002

    - hostname: test-router-2
      device_type: cisco_xr
      management_ip: 192.168.1.2
      bgp_asn: 65002
      neighbors:
        - ip: 192.168.1.1
          remote_asn: 65001

    - hostname: test-router-3
      device_type: junos
      management_ip: 192.168.1.3
      bgp_asn: 65003
      neighbors:
        - ip: 192.168.1.1
          remote_asn: 65001
