global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'netdeploy-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: 'celery'
    static_configs:
      - targets: ['celery:9109']

  - job_name: 'postgres'
    static_configs:
      - targets: ['db:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
